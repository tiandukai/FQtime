<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="柯南番茄钟">
  <meta name="theme-color" content="#42a5f5">
  <link rel="apple-touch-icon" href="images/kenan.jpg">
  <link rel="manifest" href="manifest.json">
  <title>真相只有一个 —— 番茄钟</title>
  <style>

/* ============================================
   番茄钟 —— 柯南&小兰 可爱主题
   蓝色计时 + 琥珀休息 配色
   ============================================ */

:root {
  --blue-light: #e3f2fd;
  --blue-soft: #bbdefb;
  --blue-mid: #90caf6;
  --blue-accent: #64b5f6;
  --blue-solid: #42a5f5;
  --blue-deep: #1e88e5;
  --pink-light: #fce4ec;
  --pink-soft: #f8bbd0;
  --pink-mid: #90caf6;
  --pink-accent: #42a5f5;
  --pink-solid: #1e88e5;
  --amber-light: #fff8e1;
  --amber-soft: #ffecb3;
  --amber-mid: #ffcc80;
  --amber-accent: #ff9800;
  --amber-solid: #f57c00;
  --white: #ffffff;
  --white-soft: #fafafa;
  --text-dark: #37474f;
  --text-mid: #607d8b;
  --text-light: #90a4ae;
  --shadow-soft: 0 4px 20px rgba(0, 0, 0, 0.08);
  --shadow-card: 0 8px 32px rgba(0, 0, 0, 0.1);
  --shadow-blue: 0 4px 16px rgba(66, 165, 245, 0.3);
  --shadow-amber: 0 4px 16px rgba(255, 152, 0, 0.2);
  --radius-sm: 12px;
  --radius: 18px;
  --radius-lg: 24px;
  --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: "Microsoft YaHei", "PingFang SC", "Noto Sans SC", sans-serif;
  background: linear-gradient(160deg, #0a1628 0%, #0f2440 40%, #0d1b35 100%);
  color: var(--text-dark);
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  padding: 20px;
  user-select: none;
  -webkit-user-select: none;
  -webkit-tap-highlight-color: transparent;
  overflow-x: hidden;
  position: relative;
}

/* ========== 5图拍立得拼贴背景 ========== */
.bg-collage {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
}

.photo-card {
  position: absolute;
  padding: 6px;
  background: #111;
  border-radius: 3px;
  box-shadow: 0 6px 20px rgba(0, 0, 0, 0.5);
}

.photo-card img {
  display: block;
  width: 100%;
  height: auto;
}

.photo-kenan {
  bottom: 5%;
  left: 50%;
  width: 230px;
  transform: translate(-50%, 0) rotate(-2deg);
}

.photo-2 {
  top: 5%;
  left: 3%;
  width: 220px;
  transform: rotate(3deg);
}

.photo-3 {
  top: 4%;
  right: 4%;
  width: 170px;
  transform: rotate(-4deg);
}

.photo-4 {
  top: 42%;
  left: 3%;
  width: 200px;
  transform: rotate(2.5deg);
}

.photo-5 {
  top: 44%;
  right: 4%;
  width: 165px;
  transform: rotate(-3deg);
}

.bg-overlay {
  position: fixed;
  inset: 0;
  z-index: 1;
  pointer-events: none;
  background: rgba(5, 12, 30, 0.2);
}

/* 卡片内容区域加深背景保证可读性 */
.case-file-card,
.settings-section,
.stats-section,
.task-section,
.encourage-box {
  background: rgba(255, 255, 255, 0.25);
  backdrop-filter: blur(12px);
}

/* ========== 可爱浮动装饰 ========== */
.cute-decor {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 7;
  overflow: hidden;
}
.cute-float {
  position: absolute;
  font-size: 1.8rem;
  opacity: 0.5;
  animation: cute-float 18s ease-in-out infinite;
}
.c1 { top: 8%; left: 5%; animation-delay: 0s; font-size: 2.2rem; }
.c2 { top: 15%; right: 8%; animation-delay: -3s; font-size: 1.6rem; }
.c3 { top: 50%; left: 3%; animation-delay: -6s; font-size: 1.8rem; }
.c4 { top: 70%; right: 5%; animation-delay: -9s; font-size: 2rem; }
.c5 { top: 35%; right: 10%; animation-delay: -12s; font-size: 1.5rem; }
.c6 { bottom: 20%; left: 10%; animation-delay: -15s; font-size: 1.7rem; }
.c7 { top: 5%; left: 40%; animation-delay: -4s; font-size: 1.4rem; }
.c8 { bottom: 10%; right: 25%; animation-delay: -8s; font-size: 1.6rem; }

@keyframes cute-float {
  0%, 100% { transform: translateY(0) rotate(0deg) scale(1); }
  25% { transform: translateY(-18px) rotate(8deg) scale(1.1); }
  50% { transform: translateY(-8px) rotate(-5deg) scale(0.95); }
  75% { transform: translateY(-22px) rotate(3deg) scale(1.05); }
}

.container {
  position: relative;
  z-index: 10;
  width: 100%;
  max-width: 500px;
  display: flex;
  flex-direction: column;
  gap: 20px;
}

/* ========== 顶部标题栏 ========== */
.header {
  text-align: center;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
}

/* ---- 柯南头像 ---- */
.conan-avatar {
  margin-bottom: 4px;
  filter: drop-shadow(0 6px 20px rgba(0, 0, 0, 0.15));
  width: 96px;
  height: 96px;
  border-radius: 50%;
  overflow: hidden;
  position: relative;
  background: #fdd9b5;
}

.conan-avatar-img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

/* CSS fallback when image fails to load */
.conan-avatar.fallback .conan-avatar-img {
  display: none;
}

.conan-avatar.fallback {
  background: #fdd9b5;
}

.conan-avatar.fallback::after {
  content: "🔍";
  font-size: 2.5rem;
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
}

.title {
  font-size: 2rem;
  font-weight: 700;
  color: #37474f;
  letter-spacing: 4px;
  text-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
}

.title-underline {
  display: flex;
  align-items: center;
  gap: 8px;
}
.underline-line {
  width: 36px; height: 2px;
  background: linear-gradient(90deg, transparent, rgba(236, 64, 122, 0.4), transparent);
}
.underline-heart {
  font-size: 0.8rem;
  opacity: 0.7;
}
.underline-star {
  color: #ffb74d;
  font-size: 8px;
  text-shadow: 0 0 6px rgba(255, 183, 77, 0.5);
}

.subtitle {
  font-size: 0.9rem;
  color: var(--text-mid);
  letter-spacing: 2px;
}

/* ========== 鼓励话语 ========== */
.encourage-box {
  background: linear-gradient(135deg, rgba(255, 255, 255, 0.85), rgba(255, 255, 255, 0.7));
  backdrop-filter: blur(10px);
  border: 2px solid rgba(244, 143, 177, 0.3);
  border-radius: var(--radius-lg);
  padding: 14px 20px;
  display: flex;
  align-items: center;
  gap: 10px;
  box-shadow: var(--shadow-pink);
  animation: encourage-glow 3s ease-in-out infinite;
}

@keyframes encourage-glow {
  0%, 100% { box-shadow: 0 4px 16px rgba(236, 64, 122, 0.15); }
  50% { box-shadow: 0 4px 24px rgba(236, 64, 122, 0.3); }
}

.encourage-icon {
  font-size: 1.6rem;
  animation: icon-bounce 1.5s ease-in-out infinite;
  flex-shrink: 0;
}

@keyframes icon-bounce {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-6px); }
}

.encourage-text {
  font-size: 0.95rem;
  font-weight: 600;
  color: #1e88e5;
  letter-spacing: 1px;
  line-height: 1.4;
}

/* ========== 案件卷宗卡片 ========== */
.case-file-card {
  background: rgba(255, 255, 255, 0.35);
  backdrop-filter: blur(16px);
  border: 1.5px solid rgba(255, 255, 255, 0.25);
  border-radius: var(--radius-lg);
  padding: 28px 28px 24px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 18px;
  box-shadow: var(--shadow-card);
  position: relative;
  overflow: hidden;
}

.case-file-card::before {
  content: "";
  position: absolute;
  top: 0; left: 20px; right: 20px;
  height: 2px;
  background: linear-gradient(90deg, transparent, rgba(236, 64, 122, 0.4), rgba(66, 165, 245, 0.4), transparent);
}

/* 案件标签 */
.case-label {
  display: flex;
  align-items: center;
  gap: 12px;
}
.case-number {
  font-size: 0.85rem;
  font-weight: 600;
  color: var(--text-mid);
  letter-spacing: 1px;
  font-family: "SF Mono", "Cascadia Code", monospace;
  background: rgba(100, 181, 246, 0.1);
  padding: 5px 12px;
  border-radius: 6px;
  border: 1px solid rgba(100, 181, 246, 0.2);
}
.case-status {
  font-size: 0.8rem;
  font-weight: 600;
  padding: 5px 14px;
  border-radius: 12px;
  letter-spacing: 1px;
}
.case-status.work-status {
  background: rgba(236, 64, 122, 0.1);
  color: #1e88e5;
  border: 1px solid rgba(236, 64, 122, 0.25);
  animation: status-pulse 2.5s ease-in-out infinite;
}
.case-status.break-status {
  background: rgba(255, 152, 0, 0.1);
  color: #f57c00;
  border: 1px solid rgba(255, 152, 0, 0.25);
}

@keyframes status-pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.65; }
}

/* ========== 计时器环形区域 ========== */
.timer-ring {
  position: relative;
  width: 240px;
  height: 240px;
}

.progress-ring {
  width: 100%;
  height: 100%;
  transform: rotate(-90deg);
}

.ring-dots {
  fill: none;
  stroke: rgba(100, 181, 246, 0.15);
  stroke-width: 1;
  stroke-dasharray: 2 6;
}

.ring-bg {
  fill: none;
  stroke: #e3f2fd;
  stroke-width: 8;
}

.ring-progress {
  fill: none;
  stroke-width: 8;
  stroke-linecap: round;
  transition: stroke-dashoffset 0.4s linear, stroke var(--transition);
}

.ring-progress.work-mode {
  stroke: #42a5f5;
  filter: drop-shadow(0 0 10px rgba(236, 64, 122, 0.5));
}

.ring-progress.break-mode {
  stroke: #ff9800;
  filter: drop-shadow(0 0 10px rgba(255, 152, 0, 0.5));
}

.ring-glow {
  fill: none;
  stroke: transparent;
  stroke-width: 14;
  pointer-events: none;
}

.ring-glow.active {
  stroke: #90caf6;
  opacity: 0.12;
  animation: pulse-glow 2.5s ease-in-out infinite;
}

@keyframes pulse-glow {
  0%, 100% { opacity: 0.06; }
  50% { opacity: 0.2; }
}

.ring-bowtie-dot {
  fill: #1e88e5;
  filter: drop-shadow(0 0 6px rgba(233, 30, 99, 0.6));
}

/* 时间显示 */
.timer-display {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  display: flex;
  align-items: baseline;
  gap: 2px;
}

.timer-minutes,
.timer-seconds {
  font-size: 3.4rem;
  font-weight: 700;
  color: #37474f;
  font-variant-numeric: tabular-nums;
  font-family: "SF Mono", "Cascadia Code", "Consolas", "Microsoft YaHei", monospace;
}

.timer-separator {
  font-size: 2.8rem;
  font-weight: 700;
  color: #42a5f5;
  animation: blink-sep 1s steps(1) infinite;
}

.timer-separator.paused { animation: none; opacity: 0.5; }

@keyframes blink-sep {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.25; }
}

/* 模式指示器 */
.mode-row {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 0.85rem;
  color: var(--text-mid);
}

.mode-indicator {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 6px 16px;
  border-radius: 20px;
  background: rgba(255, 255, 255, 0.6);
  border: 1px solid rgba(0, 0, 0, 0.06);
  transition: all var(--transition);
}

.mode-indicator.work {
  border-color: rgba(236, 64, 122, 0.3);
  box-shadow: 0 0 14px rgba(236, 64, 122, 0.1);
}
.mode-indicator.break {
  border-color: rgba(255, 152, 0, 0.3);
  box-shadow: 0 0 14px rgba(255, 152, 0, 0.1);
}

.mode-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: #42a5f5;
  animation: dot-pulse 1.5s ease-in-out infinite;
}
.mode-indicator.break .mode-dot { background: #ff9800; }

@keyframes dot-pulse {
  0%, 100% { opacity: 1; box-shadow: 0 0 4px currentColor; }
  50% { opacity: 0.4; box-shadow: 0 0 10px currentColor; }
}

.mode-text { font-size: 0.85rem; font-weight: 500; letter-spacing: 1px; }

.session-divider { opacity: 0.3; }
.session-hint { letter-spacing: 1px; }

/* ========== 控制按钮 ========== */
.controls {
  display: flex;
  gap: 12px;
  align-items: center;
}

.btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  border: none;
  font-family: inherit;
  font-weight: 600;
  cursor: pointer;
  transition: all var(--transition);
  outline: none;
  letter-spacing: 1px;
}

.btn:active { transform: scale(0.95); }

.btn-primary {
  padding: 14px 32px;
  background: linear-gradient(135deg, #42a5f5, #1e88e5);
  color: #fff;
  border-radius: 28px;
  font-size: 0.95rem;
  box-shadow: 0 4px 20px rgba(233, 30, 99, 0.3);
}

.btn-primary:hover {
  box-shadow: 0 6px 28px rgba(233, 30, 99, 0.45);
  transform: translateY(-2px);
}

.btn-primary:active { transform: scale(0.95) translateY(0); }

.btn-primary.paused-state {
  background: linear-gradient(135deg, #ff9800, #f57c00);
  box-shadow: 0 4px 20px rgba(255, 152, 0, 0.3);
}
.btn-primary.paused-state:hover {
  box-shadow: 0 6px 28px rgba(255, 152, 0, 0.45);
}

.btn-icon-only {
  width: 46px; height: 46px;
  border-radius: 50%;
  background: rgba(255, 255, 255, 0.7);
  color: var(--text-mid);
  font-size: 1.2rem;
  border: 2px solid rgba(0, 0, 0, 0.06);
}
.btn-icon-only:hover {
  background: #fff;
  color: #42a5f5;
  border-color: rgba(236, 64, 122, 0.25);
}

.silent-btn.silent {
  color: #999;
  border-color: rgba(0, 0, 0, 0.08);
}

/* ========== 时间自定义设置 ========== */
.settings-section {
  background: rgba(255, 255, 255, 0.8);
  backdrop-filter: blur(10px);
  border-radius: var(--radius-lg);
  padding: 20px 22px;
  border: 2px solid rgba(187, 222, 251, 0.35);
  box-shadow: var(--shadow-blue);
}

.settings-header {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 14px;
}
.settings-icon { font-size: 1.2rem; }
.settings-title {
  font-size: 1rem;
  font-weight: 600;
  letter-spacing: 1px;
  color: #37474f;
}

/* ========== iOS 风格滚轮时间选择器 ========== */

/* 分段标签 */
.picker-tabs {
  display: flex;
  background: rgba(0,0,0,0.06);
  border-radius: 10px;
  padding: 3px;
  margin-bottom: 16px;
  gap: 3px;
}
.picker-tab {
  flex: 1;
  padding: 8px 0;
  border: none;
  background: transparent;
  border-radius: 8px;
  font-size: 0.8rem;
  font-weight: 600;
  color: var(--text-mid);
  cursor: pointer;
  transition: all 0.25s ease;
  letter-spacing: 0.5px;
}
.picker-tab.active {
  background: #fff;
  color: #37474f;
  box-shadow: 0 1px 4px rgba(0,0,0,0.1);
}

/* 选中时间显示 */
.picker-display {
  text-align: center;
  font-size: 1rem;
  font-weight: 700;
  color: #42a5f5;
  margin-bottom: 10px;
  letter-spacing: 1px;
}

/* 滚轮容器 */
.picker-container {
  position: relative;
  height: 180px;
  overflow: hidden;
  border-radius: 12px;
  background: rgba(0,0,0,0.03);
  margin-bottom: 16px;
  user-select: none;
  -webkit-user-select: none;
}

/* 中央高亮条 */
.picker-highlight {
  position: absolute;
  top: 50%;
  left: 8px;
  right: 8px;
  height: 40px;
  transform: translateY(-50%);
  background: rgba(66, 165, 245, 0.08);
  border-top: 1.5px solid rgba(66, 165, 245, 0.3);
  border-bottom: 1.5px solid rgba(66, 165, 245, 0.3);
  border-radius: 6px;
  pointer-events: none;
  z-index: 2;
}

/* 顶部和底部渐变遮罩 */
.picker-container::before,
.picker-container::after {
  content: "";
  position: absolute;
  left: 0;
  right: 0;
  height: 70px;
  pointer-events: none;
  z-index: 3;
}
.picker-container::before {
  top: 0;
  background: linear-gradient(to bottom, rgba(255,255,255,0.95) 0%, rgba(255,255,255,0.4) 60%, transparent 100%);
}
.picker-container::after {
  bottom: 0;
  background: linear-gradient(to top, rgba(255,255,255,0.95) 0%, rgba(255,255,255,0.4) 60%, transparent 100%);
}

/* 列布局 */
.picker-columns {
  display: flex;
  height: 100%;
  position: relative;
  z-index: 1;
}
.picker-column {
  flex: 1;
  overflow-y: auto;
  scroll-snap-type: y mandatory;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
  -ms-overflow-style: none;
}
.picker-column::-webkit-scrollbar {
  display: none;
}

/* 列表 padding 让首尾项可滚到中央 */
.picker-list {
  padding: 70px 0;
}

/* 每个选项 */
.picker-item {
  height: 40px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.3rem;
  font-weight: 600;
  color: #b0bec5;
  scroll-snap-align: center;
  transition: color 0.15s ease;
  font-variant-numeric: tabular-nums;
  font-family: "SF Mono", "Cascadia Code", "Consolas", monospace;
}
.picker-item.selected {
  color: #37474f;
  font-weight: 700;
  font-size: 1.4rem;
}

/* 底部标签 (时/分/秒) */
.picker-labels {
  display: flex;
  position: absolute;
  bottom: 22px;
  left: 0;
  right: 0;
  z-index: 4;
  pointer-events: none;
}
.picker-labels span {
  flex: 1;
  text-align: center;
  font-size: 0.65rem;
  font-weight: 600;
  color: rgba(55,71,79,0.4);
  letter-spacing: 1px;
}

.btn-apply {
  width: 100%;
  padding: 12px;
  background: linear-gradient(135deg, #bbdefb, #90caf6);
  color: #37474f;
  border-radius: var(--radius-sm);
  font-size: 0.9rem;
  font-weight: 600;
  letter-spacing: 2px;
  border: none;
  cursor: pointer;
  transition: all var(--transition);
}
.btn-apply:hover {
  background: linear-gradient(135deg, #90caf6, #64b5f6);
  box-shadow: var(--shadow-blue);
}

/* ========== 统计面板 ========== */
.stats-section {
  background: rgba(255, 255, 255, 0.8);
  backdrop-filter: blur(10px);
  border-radius: var(--radius-lg);
  padding: 22px 24px;
  border: 2px solid rgba(248, 187, 208, 0.35);
  box-shadow: var(--shadow-pink);
}

.evidence-header {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 18px;
}
.evidence-icon { font-size: 1.2rem; }
.stats-title {
  font-size: 1rem;
  font-weight: 600;
  letter-spacing: 1px;
  color: #37474f;
}

.stats-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
  margin-bottom: 16px;
}

.stat-card {
  background: rgba(227, 242, 253, 0.5);
  border-radius: var(--radius-sm);
  padding: 14px 14px;
  text-align: center;
  border: 1px solid rgba(187, 222, 251, 0.3);
  transition: all var(--transition);
}

.stat-card:hover {
  border-color: rgba(244, 143, 177, 0.4);
  transform: translateY(-2px);
  box-shadow: var(--shadow-soft);
}

.stat-icon {
  display: block;
  font-size: 1rem;
  margin-bottom: 4px;
  opacity: 0.6;
}

.stat-value {
  display: block;
  font-size: 1.6rem;
  font-weight: 700;
  color: #42a5f5;
  font-variant-numeric: tabular-nums;
}

.stat-label {
  display: block;
  font-size: 0.72rem;
  color: var(--text-mid);
  margin-top: 2px;
}

/* 每日目标进度条 */
.daily-goal {
  margin-bottom: 14px;
  padding: 0 2px;
}
.goal-header {
  display: flex;
  justify-content: space-between;
  font-size: 0.75rem;
  color: var(--text-mid);
  margin-bottom: 8px;
}
.goal-bar {
  height: 6px;
  background: #e3f2fd;
  border-radius: 3px;
  overflow: hidden;
}
.goal-fill {
  height: 100%;
  background: linear-gradient(90deg, #90caf6, #42a5f5);
  border-radius: 3px;
  transition: width 0.6s ease;
  box-shadow: 0 0 8px rgba(236, 64, 122, 0.3);
}

/* 每周柱状图 */
.weekly-chart {
  margin-bottom: 18px;
  padding: 0 2px;
}
.chart-header {
  font-size: 0.75rem;
  color: var(--text-mid);
  margin-bottom: 12px;
}
.chart-bars {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  height: 120px;
  padding: 0 4px;
  gap: 6px;
}
.chart-bar-wrap {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  height: 100%;
  justify-content: flex-end;
}
.chart-bar {
  width: 100%;
  max-width: 36px;
  border-radius: 6px 6px 2px 2px;
  background: rgba(66, 165, 245, 0.18);
  min-height: 4px;
  transition: height 0.5s ease;
  position: relative;
}
.chart-bar.has-data {
  background: linear-gradient(180deg, #64b5f6, #42a5f5);
  box-shadow: 0 2px 8px rgba(66, 165, 245, 0.3);
}
.chart-bar.today {
  background: linear-gradient(180deg, #ec407a, #f06292);
  box-shadow: 0 2px 8px rgba(236, 64, 122, 0.35);
}
.chart-days {
  display: flex;
  justify-content: space-between;
  padding: 0 4px;
  gap: 6px;
}
.chart-days .chart-bar-label {
  flex: 1;
  font-size: 0.65rem;
  color: var(--text-mid);
  margin-top: 6px;
  text-align: center;
}
.bar-tooltip {
  position: absolute;
  top: -22px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 0.62rem;
  color: #42a5f5;
  white-space: nowrap;
  opacity: 0;
  transition: opacity 0.2s;
  pointer-events: none;
}
.chart-bar:hover .bar-tooltip,
.chart-bar:active .bar-tooltip {
  opacity: 1;
}

.btn-text {
  background: transparent;
  color: var(--text-mid);
  border: none;
  padding: 6px 12px;
  font-size: 0.78rem;
  font-family: inherit;
  cursor: pointer;
  margin: 0 auto;
  display: block;
  transition: color var(--transition);
  letter-spacing: 1px;
}
.btn-text:hover { color: #42a5f5; }

/* ========== 任务列表 ========== */
.task-section {
  background: rgba(255, 255, 255, 0.8);
  backdrop-filter: blur(10px);
  border-radius: var(--radius-lg);
  padding: 20px 22px;
  border: 2px solid rgba(248, 187, 208, 0.35);
  box-shadow: var(--shadow-pink);
}

.task-header {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 14px;
  flex-wrap: wrap;
}
.task-icon { font-size: 1.2rem; }
.task-title {
  font-size: 1rem;
  font-weight: 600;
  letter-spacing: 1px;
  color: #37474f;
  flex: 1;
}
.task-progress {
  font-size: 0.78rem;
  font-weight: 600;
  color: #1e88e5;
  background: rgba(236, 64, 122, 0.1);
  padding: 4px 12px;
  border-radius: 12px;
  letter-spacing: 1px;
}

.task-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
  margin-bottom: 12px;
}

.task-card {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 14px;
  border-radius: var(--radius-sm);
  border: 1px solid rgba(187, 222, 251, 0.35);
  background: rgba(255, 255, 255, 0.7);
  transition: all var(--transition);
  cursor: default;
}
.task-card.completed {
  background: rgba(76, 175, 80, 0.06);
  border-color: rgba(76, 175, 80, 0.2);
}
.task-card.completed .task-card-name {
  text-decoration: line-through;
  color: #999;
}
.task-card-icon {
  font-size: 1.3rem;
  flex-shrink: 0;
}
.task-card-body {
  flex: 1;
  min-width: 0;
}
.task-card-name {
  font-size: 0.88rem;
  font-weight: 600;
  color: #37474f;
  letter-spacing: 0.5px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.task-card-meta {
  font-size: 0.7rem;
  color: var(--text-mid);
  margin-top: 2px;
}
.task-card-status {
  font-size: 0.72rem;
  font-weight: 600;
  padding: 3px 10px;
  border-radius: 10px;
  letter-spacing: 1px;
  flex-shrink: 0;
}
.task-card-status.in-progress {
  background: rgba(236, 64, 122, 0.1);
  color: #1e88e5;
}
.task-card-status.done {
  background: rgba(76, 175, 80, 0.1);
  color: #4caf50;
}
.task-card-delete {
  font-size: 0.85rem;
  opacity: 0;
  cursor: pointer;
  color: #999;
  transition: all var(--transition);
  border: none;
  background: none;
  padding: 4px;
  flex-shrink: 0;
}
.task-card:hover .task-card-delete {
  opacity: 0.6;
}
.task-card:hover .task-card-delete:hover {
  opacity: 1;
  color: #1e88e5;
}

.task-add-row {
  display: flex;
  gap: 8px;
}
.task-add-input {
  flex: 1;
  padding: 10px 14px;
  border: 2px dashed rgba(187, 222, 251, 0.5);
  border-radius: var(--radius-sm);
  font-size: 0.85rem;
  font-family: inherit;
  color: #37474f;
  background: rgba(255, 255, 255, 0.6);
  outline: none;
  transition: all var(--transition);
  letter-spacing: 0.5px;
}
.task-add-input:focus {
  border-color: #42a5f5;
  border-style: solid;
  box-shadow: 0 0 0 3px rgba(236, 64, 122, 0.08);
}
.task-add-input::placeholder {
  color: #bdbdbd;
}
.btn-task-add {
  padding: 10px 18px;
  background: linear-gradient(135deg, #90caf6, #42a5f5);
  color: #fff;
  border: none;
  border-radius: var(--radius-sm);
  font-size: 0.85rem;
  font-weight: 600;
  font-family: inherit;
  cursor: pointer;
  letter-spacing: 1px;
  transition: all var(--transition);
  white-space: nowrap;
}
.btn-task-add:hover {
  box-shadow: var(--shadow-pink);
}
.btn-task-add:active {
  transform: scale(0.95);
}

/* ========== 页脚 ========== */
.footer {
  text-align: center;
  padding-bottom: 12px;
}
.footer-seal {
  font-size: 1.8rem;
  margin-bottom: 6px;
  opacity: 0.35;
}
.footer p {
  font-size: 0.75rem;
  color: var(--text-mid);
  letter-spacing: 1px;
  line-height: 1.8;
}
.footer-by {
  font-size: 0.7rem;
  color: rgba(0, 0, 0, 0.2);
  margin-top: 2px;
}

/* ========== Toast 通知 ========== */
.toast {
  position: fixed;
  top: 20px;
  left: 50%;
  transform: translateX(-50%) translateY(-120px);
  background: rgba(255, 255, 255, 0.95);
  backdrop-filter: blur(10px);
  color: #37474f;
  padding: 14px 28px;
  border-radius: 28px;
  font-size: 0.9rem;
  font-weight: 600;
  letter-spacing: 1px;
  box-shadow: 0 8px 32px rgba(0, 0, 0, 0.12);
  border: 2px solid rgba(244, 143, 177, 0.3);
  z-index: 100;
  transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  pointer-events: none;
}
.toast.show {
  transform: translateX(-50%) translateY(0);
}

/* ========== 足球射门动画 ========== */
.goal-overlay {
  position: fixed;
  inset: 0;
  z-index: 200;
  background: rgba(0, 0, 0, 0.55);
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s ease;
}
.goal-overlay.show {
  opacity: 1;
  pointer-events: auto;
}

.goal-popup {
  background: #fff;
  border-radius: 24px;
  padding: 32px 40px;
  text-align: center;
  box-shadow: 0 20px 60px rgba(0, 0, 0, 0.25);
  border: 2px solid rgba(236, 64, 122, 0.2);
  position: relative;
  overflow: hidden;
  animation: popup-in 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}

@keyframes popup-in {
  0% { transform: scale(0.7); opacity: 0; }
  100% { transform: scale(1); opacity: 1; }
}

.goal-field {
  position: relative;
  padding: 20px 0;
  background: linear-gradient(0deg, #c8e6c9 0%, #e8f5e9 50%, #fff 100%);
  border-radius: 16px;
  margin-bottom: 16px;
  overflow: hidden;
}

.goal-field::before {
  content: "";
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 3px;
  background: rgba(255, 255, 255, 0.7);
}

.goal-net {
  font-size: 56px;
  position: relative;
  z-index: 2;
}

.goal-count {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 32px;
  font-weight: 900;
  color: #1e88e5;
  text-shadow: 0 2px 12px rgba(233, 30, 99, 0.5);
  z-index: 3;
  animation: count-pop 0.8s ease-out 0.3s both;
}

@keyframes count-pop {
  0% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
  60% { transform: translate(-50%, -50%) scale(1.4); opacity: 1; }
  100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
}

.goal-ball {
  font-size: 36px;
  animation: ball-shoot 0.6s ease-out;
  position: relative;
  z-index: 2;
  margin-top: 4px;
}

@keyframes ball-shoot {
  0% { transform: translateY(80px) scale(0.2); opacity: 0; }
  30% { transform: translateY(-15px) scale(1.2); opacity: 1; }
  60% { transform: translateY(5px) scale(0.9); }
  80% { transform: translateY(0) scale(1.05); }
  100% { transform: translateY(0) scale(1); }
}

.goal-text {
  font-size: 1.1rem;
  font-weight: 700;
  color: #37474f;
  letter-spacing: 2px;
  margin: 0;
}

.goal-sub {
  font-size: 0.85rem;
  color: #1e88e5;
  letter-spacing: 2px;
  margin: 4px 0 0;
  font-weight: 600;
}

/* ========== 眼镜反光效果 ========== */
.glasses-reflection {
  position: fixed;
  inset: 0;
  z-index: 8;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.8s ease;
}
.glasses-reflection.active {
  opacity: 1;
}

.glasses-edge {
  position: absolute;
  background: radial-gradient(ellipse at center,
    rgba(66, 165, 245, 0.25) 0%,
    rgba(100, 181, 246, 0.1) 40%,
    transparent 70%
  );
}
.glasses-edge-top {
  top: 0; left: 10%; right: 10%; height: 60px;
  background: linear-gradient(180deg,
    rgba(66, 165, 245, 0.3) 0%,
    rgba(100, 181, 246, 0.08) 60%,
    transparent 100%
  );
}
.glasses-edge-bottom {
  bottom: 0; left: 10%; right: 10%; height: 60px;
  background: linear-gradient(0deg,
    rgba(66, 165, 245, 0.3) 0%,
    rgba(100, 181, 246, 0.08) 60%,
    transparent 100%
  );
}
.glasses-edge-left {
  top: 10%; bottom: 10%; left: 0; width: 40px;
  background: linear-gradient(90deg,
    rgba(66, 165, 245, 0.3) 0%,
    rgba(100, 181, 246, 0.08) 60%,
    transparent 100%
  );
}
.glasses-edge-right {
  top: 10%; bottom: 10%; right: 0; width: 40px;
  background: linear-gradient(270deg,
    rgba(66, 165, 245, 0.3) 0%,
    rgba(100, 181, 246, 0.08) 60%,
    transparent 100%
  );
}

.glasses-corner {
  position: absolute;
  width: 80px; height: 80px;
}
.glasses-corner-tl {
  top: 0; left: 0;
  background: radial-gradient(circle at 0 0,
    rgba(66, 165, 245, 0.35) 0%,
    rgba(100, 181, 246, 0.1) 30%,
    transparent 60%
  );
}
.glasses-corner-tr {
  top: 0; right: 0;
  background: radial-gradient(circle at 100% 0,
    rgba(66, 165, 245, 0.35) 0%,
    rgba(100, 181, 246, 0.1) 30%,
    transparent 60%
  );
}
.glasses-corner-bl {
  bottom: 0; left: 0;
  background: radial-gradient(circle at 0 100%,
    rgba(66, 165, 245, 0.35) 0%,
    rgba(100, 181, 246, 0.1) 30%,
    transparent 60%
  );
}
.glasses-corner-br {
  bottom: 0; right: 0;
  background: radial-gradient(circle at 100% 100%,
    rgba(66, 165, 245, 0.35) 0%,
    rgba(100, 181, 246, 0.1) 30%,
    transparent 60%
  );
}

.glasses-text {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) translateY(80px);
  font-size: 1rem;
  font-weight: 700;
  color: #42a5f5;
  letter-spacing: 3px;
  text-shadow: 0 0 20px rgba(66, 165, 245, 0.4), 0 0 40px rgba(66, 165, 245, 0.2);
  opacity: 0;
  transition: all 0.8s ease;
  white-space: nowrap;
}
.glasses-reflection.active .glasses-text {
  opacity: 1;
  transform: translate(-50%, -50%) translateY(0);
  animation: glasses-text-float 3s ease-in-out infinite;
}

@keyframes glasses-text-float {
  0%, 100% { transform: translate(-50%, -50%) translateY(0); }
  50% { transform: translate(-50%, -50%) translateY(-8px); }
}

/* ========== 长按重置动画 ========== */
.btn-icon-only.long-pressing {
  position: relative;
  overflow: hidden;
}
.btn-icon-only.long-pressing::after {
  content: "";
  position: absolute;
  inset: 0;
  background: rgba(236, 64, 122, 0.15);
  border-radius: 50%;
  transform: scale(0);
  animation: long-press-fill 1s linear forwards;
}
@keyframes long-press-fill {
  0% { transform: scale(0); }
  100% { transform: scale(1); }
}

/* ========== 响应式 ========== */
@media (max-width: 480px) {
  .container { gap: 16px; max-width: 100%; }
  .title { font-size: 1.5rem; }
  .conan-avatar { width: 80px; height: 80px; }
  .timer-ring { width: 200px; height: 200px; }
  .timer-minutes, .timer-seconds { font-size: 2.6rem; }
  .timer-separator { font-size: 2.2rem; }
  .case-file-card { padding: 20px 16px 18px; }
  .btn-primary { padding: 12px 24px; font-size: 0.85rem; }
  .btn-icon-only { width: 40px; height: 40px; font-size: 1rem; }
  .settings-section, .stats-section { padding: 16px 14px; }
  .stat-value { font-size: 1.3rem; }
  .controls { gap: 8px; }

  /* 照片墙 — 移动端缩小 + 四角分布，互不遮挡 */
  .photo-kenan { bottom: 1.5%; width: 205px; }
  .photo-2 { top: 1.5%; left: 1%; width: 175px; }
  .photo-3 { top: 1%; right: 1%; width: 150px; }
  .photo-4 { top: 38%; left: 1%; width: 160px; }
  .photo-5 { top: 36%; right: 2%; width: 140px; }
}

// ========== 音频系统 ==========
let audioCtx = null;

function getAudioContext() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  // iOS Safari 挂起 AudioContext，需要 resume
  if (audioCtx.state === "suspended") {
    audioCtx.resume();
  }
  return audioCtx;
}

function playCompleteSound() {
  try {
    const ctx = getAudioContext();
    const now = ctx.currentTime;

    const notes = [784, 988, 1175];
    notes.forEach((freq, i) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = "triangle";
      osc.frequency.value = freq;
      gain.gain.setValueAtTime(0.25, now + i * 0.18);
      gain.gain.exponentialRampToValueAtTime(0.01, now + i * 0.18 + 0.35);
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.start(now + i * 0.18);
      osc.stop(now + i * 0.18 + 0.35);
    });

    setTimeout(() => {
      const ctx2 = getAudioContext();
      const now2 = ctx2.currentTime;
      [523, 659, 784].forEach((freq, i) => {
        const osc = ctx2.createOscillator();
        const gain = ctx2.createGain();
        osc.type = "sine";
        osc.frequency.value = freq;
        gain.gain.setValueAtTime(0.2, now2 + i * 0.12);
        gain.gain.exponentialRampToValueAtTime(0.01, now2 + i * 0.12 + 0.5);
        osc.connect(gain);
        gain.connect(ctx2.destination);
        osc.start(now2 + i * 0.12);
        osc.stop(now2 + i * 0.12 + 0.5);
      });
    }, 700);
  } catch (e) { /* 静默处理 */ }
}

function playClickSound() {
  try {
    const ctx = getAudioContext();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = "sine";
    osc.frequency.value = 500;
    gain.gain.setValueAtTime(0.12, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.06);
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + 0.06);
  } catch (e) { /* 静默处理 */ }
}

// ========== 后台保活系统（Wake Lock + 静默音频） ==========
async function requestWakeLock() {
  if (silentMode) return;
  try {
    if ("wakeLock" in navigator && !wakeLock) {
      wakeLock = await navigator.wakeLock.request("screen");
      wakeLock.addEventListener("release", () => { wakeLock = null; });
    }
  } catch (e) { /* 不支持或被拒绝 */ }
}

async function releaseWakeLock() {
  if (wakeLock) {
    try { await wakeLock.release(); } catch (e) {}
    wakeLock = null;
  }
}

// 静默音频保活：iOS Safari 后台时保持 JS 运行
function startKeepAlive() {
  if (silentMode) return;
  try {
    const ctx = getAudioContext();
    if (!keepAliveNode) {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = "sine";
      osc.frequency.value = 1; // 1Hz，人耳听不到
      gain.gain.value = 0.001; // 近乎静音
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.start();
      keepAliveNode = { osc, gain };
    }
  } catch (e) {}
}

function stopKeepAlive() {
  if (keepAliveNode) {
    try {
      keepAliveNode.osc.stop();
      keepAliveNode.osc.disconnect();
      keepAliveNode.gain.disconnect();
    } catch (e) {}
    keepAliveNode = null;
  }
}

// ========== 通知系统 ==========
let notificationPermission = "default";

function requestNotificationPermission() {
  try {
    if ("Notification" in window) {
      if (Notification.permission === "default") {
        Notification.requestPermission().then((perm) => {
          notificationPermission = perm;
        }).catch(function () {});
      } else {
        notificationPermission = Notification.permission;
      }
    }
  } catch (e) { /* iOS Safari may lack Notification entirely */ }
}

function sendNotification(title, body) {
  if ("Notification" in window && notificationPermission === "granted") {
    new Notification(title, {
      body,
      icon: "data:image/svg+xml," + encodeURIComponent(
        '<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64"><text x="50%" y="55%" text-anchor="middle" font-size="48">🔍</text></svg>'
      ),
      tag: "pomodoro-conan",
      requireInteraction: true,
    });
  }
  showToast(body);
}

let toastTimer = null;
function showToast(message) {
  let toast = document.querySelector(".toast");
  if (!toast) {
    toast = document.createElement("div");
    toast.className = "toast";
    document.body.appendChild(toast);

  toast.textContent = message;
  toast.classList.add("show");

}

// ========== 统计系统 ==========
const STORAGE_KEY = "pomodoro_conan_stats_v3";

function loadStats() {
  const defaultStats = {
    todayDate: getTodayStr(),
    todayCount: 0,
    totalCount: 0,
    todayFocusMinutes: 0,
    todayInterrupts: 0,
    streakDays: 0,
    lastActiveDate: null,
    weeklyData: [],
  };

  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return defaultStats;
    const parsed = JSON.parse(raw);
    if (parsed.todayDate !== getTodayStr()) {
      parsed.todayDate = getTodayStr();
      parsed.todayCount = 0;
      parsed.todayFocusMinutes = 0;
      parsed.todayInterrupts = 0;
    }
    return { ...defaultStats, ...parsed };
  } catch (e) {
    return defaultStats;
  }
}

function saveStats(stats) {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(stats));
  } catch (e) { /* 静默处理 */ }
}

function getTodayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}-${String(d.getDate()).padStart(2, "0")}`;
}

function recordCompletedPomodoro() {
  const stats = loadStats();
  const today = getTodayStr();

  if (stats.lastActiveDate) {
    const lastDate = new Date(stats.lastActiveDate);
    const todayDate = new Date(today);
    const diffDays = Math.round((todayDate - lastDate) / (1000 * 60 * 60 * 24));
    if (diffDays === 1) {
      stats.streakDays += 1;
    } else if (diffDays > 1) {
      stats.streakDays = 1;
    }
  } else {
    stats.streakDays = 1;
  }

  const focusMin = Math.round(totalWorkSec / 60);
  stats.todayCount += 1;
  stats.totalCount += 1;
  stats.todayFocusMinutes += focusMin;
  stats.todayInterrupts += sessionInterrupts;
  sessionInterrupts = 0;
  stats.lastActiveDate = today;
  stats.todayDate = today;

  // 每周数据：累加今日专注分钟
  if (!stats.weeklyData) stats.weeklyData = [];
  const todayEntry = stats.weeklyData.find(function(d) { return d.date === today; });
  if (todayEntry) {
    todayEntry.minutes += focusMin;
  } else {
    stats.weeklyData.push({ date: today, minutes: focusMin });
  }
  // 只保留最近 14 天
  const cutoff = new Date();
  cutoff.setDate(cutoff.getDate() - 14);
  const cutoffStr = cutoff.getFullYear() + "-" +
    String(cutoff.getMonth() + 1).padStart(2, "0") + "-" +
    String(cutoff.getDate()).padStart(2, "0");
  stats.weeklyData = stats.weeklyData.filter(function(d) { return d.date >= cutoffStr; });

  saveStats(stats);
  renderStats(stats);
}

function refreshStatsForToday() {
  renderStats(loadStats());
}

function renderStats(stats) {
  statToday.textContent = String(stats.todayCount);
  statTotal.textContent = String(stats.totalCount);
  statStreak.textContent = String(stats.streakDays);
  statFocusTime.textContent = `${stats.todayFocusMinutes} 分钟`;
  statInterrupts.textContent = String(stats.todayInterrupts || 0);

  const pct = Math.min(100, Math.round((stats.todayCount / DAILY_GOAL) * 100));
  goalFill.style.width = `${pct}%`;
  goalLabel.textContent = `${stats.todayCount} / ${DAILY_GOAL} 案件`;

  renderWeeklyChart(stats);
}

function renderWeeklyChart(stats) {
  const today = getTodayStr();
  const data = stats.weeklyData || [];
  // 生成最近 7 天
  const days = [];
  for (let i = 6; i >= 0; i--) {
    const d = new Date();
    d.setDate(d.getDate() - i);
    const dateStr = d.getFullYear() + "-" +
      String(d.getMonth() + 1).padStart(2, "0") + "-" +
      String(d.getDate()).padStart(2, "0");
    const entry = data.find(function(e) { return e.date === dateStr; });
    const dayNames = ["日", "一", "二", "三", "四", "五", "六"];
    days.push({
      date: dateStr,
      label: dayNames[d.getDay()],
      minutes: entry ? entry.minutes : 0,
      isToday: dateStr === today,
    });
  }

  const maxMin = Math.max.apply(null, days.map(function(d) { return d.minutes; }));
  const maxHeight = 110; // px

  chartBars.innerHTML = "";
  chartDays.innerHTML = "";

  days.forEach(function(day) {
    var wrap = document.createElement("div");
    wrap.className = "chart-bar-wrap";

    var bar = document.createElement("div");
    bar.className = "chart-bar";
    if (day.minutes > 0) bar.classList.add("has-data");
    if (day.isToday) bar.classList.add("today");

    var h = maxMin > 0 ? Math.max(6, Math.round((day.minutes / maxMin) * maxHeight)) : 6;
    bar.style.height = h + "px";
    bar.title = day.minutes + " 分钟";

    var tooltip = document.createElement("span");
    tooltip.className = "bar-tooltip";
    tooltip.textContent = day.minutes + "分钟";
    bar.appendChild(tooltip);

    wrap.appendChild(bar);

    var label = document.createElement("span");
    label.className = "chart-bar-label";
    label.textContent = day.label;

    chartBars.appendChild(wrap);
    chartDays.appendChild(label);
  });
}

function clearAllStats() {
  if (confirm("确定要清除所有调查记录吗？此操作不可撤销。")) {
    localStorage.removeItem(STORAGE_KEY);
    sessionInterrupts = 0;
    renderStats(loadStats());
    showToast("调查记录已清除");
  }
}

// ========== 自定义时间 + iOS 滚轮选择器 ==========

// 滚轮状态
let pickerMode = "work";
let pickerWorkSec = DEFAULT_WORK_SEC;
let pickerBreakSec = DEFAULT_BREAK_SEC;
let pickerScrollTimers = { hours: null, minutes: null, seconds: null };

function getMaxHours() {
  const maxSec = pickerMode === "work" ? 7200 : 3600;
  return Math.floor(maxSec / 3600);
}

function formatSeconds(totalSec) {
  const h = Math.floor(totalSec / 3600);
  const m = Math.floor((totalSec % 3600) / 60);
  const s = totalSec % 60;
  if (h > 0) {
    if (s > 0) return h + "时" + m + "分" + s + "秒";
    if (m > 0) return h + "时" + m + "分钟";
    return h + "小时";
  }
  if (m > 0) {
    if (s > 0) return m + "分" + s + "秒";
    return m + " 分钟";
  }
  return s + " 秒";
}

function getCurrentPickerSeconds() {
  const h = getSelectedValue(pickerHours);
  const m = getSelectedValue(pickerMinutes);
  const s = getSelectedValue(pickerSeconds);
  return h * 3600 + m * 60 + s;
}

function getSelectedValue(column) {
  const scrollTop = column.scrollTop;
  const itemHeight = 40;
  const centerOffset = scrollTop;
  const index = Math.round(centerOffset / itemHeight);
  const items = column.querySelectorAll(".picker-item");
  if (items.length === 0) return 0;
  const clampedIndex = Math.max(0, Math.min(index, items.length - 1));
  return parseInt(items[clampedIndex].dataset.value, 10);
}

function updatePickerSelection(column) {
  const items = column.querySelectorAll(".picker-item");
  const selectedVal = getSelectedValue(column);
  items.forEach(item => {
    const val = parseInt(item.dataset.value, 10);
    item.classList.toggle("selected", val === selectedVal);
  });
}

function onPickerScroll(column) {
  if (pickerScrollTimers[column.id]) clearTimeout(pickerScrollTimers[column.id]);
  pickerScrollTimers[column.id] = setTimeout(() => {
    updatePickerSelection(column);
    updatePickerDisplay();
  }, 80);
}

function updatePickerDisplay() {
  const totalSec = getCurrentPickerSeconds();
  pickerDisplay.textContent = formatSeconds(Math.max(totalSec, 5));
}

function buildPickerItems(column, start, end, step) {
  const list = column.querySelector(".picker-list");
  list.innerHTML = "";
  for (let i = start; i <= end; i += step) {
    const div = document.createElement("div");
    div.className = "picker-item";
    div.dataset.value = i;
    div.textContent = String(i).padStart(2, "0");
    list.appendChild(div);
  }
}

function buildAllPickerItems() {
  const maxH = getMaxHours();
  buildPickerItems(pickerHours, 0, maxH, 1);
  buildPickerItems(pickerMinutes, 0, 59, 1);
  buildPickerItems(pickerSeconds, 0, 59, 5);
}

function scrollPickerTo(totalSec, maxHours) {
  const h = Math.min(Math.floor(totalSec / 3600), maxHours);
  const m = Math.floor((totalSec % 3600) / 60);
  const s = Math.round((totalSec % 60) / 5) * 5;
  const itemH = 40;

  scrollColumnTo(pickerHours, h, itemH);
  scrollColumnTo(pickerMinutes, m, itemH);
  scrollColumnTo(pickerSeconds, s / 5, itemH);
}

function scrollColumnTo(column, index, itemH) {
  column.scrollTo({ top: index * itemH, behavior: "instant" });
  setTimeout(() => updatePickerSelection(column), 50);
}

function switchPickerMode(newMode) {
  pickerMode = newMode;
  pickerTabs.forEach(tab => {
    tab.classList.toggle("active", tab.dataset.mode === newMode);
  });
  buildAllPickerItems();
  const sec = newMode === "work" ? pickerWorkSec : pickerBreakSec;
  scrollPickerTo(sec, getMaxHours());
  updatePickerDisplay();
}

function applyCustomTime() {
  const totalSec = getCurrentPickerSeconds();

  if (totalSec < 5) {
    showToast("时间不能少于 5 秒");
    return;
  }

  const maxSec = pickerMode === "work" ? 7200 : 3600;
  if (totalSec > maxSec) {
    showToast((pickerMode === "work" ? "调查" : "休息") + "时间请设置在 5秒-" + Math.floor(maxSec/60) + "分钟 之间");
    return;
  }

  if (pickerMode === "work") {
    pickerWorkSec = totalSec;
    totalWorkSec = totalSec;
  } else {
    pickerBreakSec = totalSec;
    totalBreakSec = totalSec;
  }

  applyTimeConfig();
  saveTimeConfig();
  showToast("时间设置已更新！加油！");
  if (!silentMode) playClickSound();
  updateDocumentTitle();
}

// ========== 计时器核心 ==========
function startTimer() {
  if (isRunning) return;
  isRunning = true;
  targetEndTime = Date.now() + remainingSeconds * 1000;
  updateButtonUI();
  if (!silentMode) playClickSound();
  requestWakeLock();
  startKeepAlive();

  intervalId = setInterval(() => {
    const now = Date.now();
    const elapsed = Math.max(0, Math.round((targetEndTime - now) / 1000));
    remainingSeconds = elapsed;
    updateTimerDisplay();
    updateRingProgress();
    updateDocumentTitle();

    if (remainingSeconds <= 0) {
      completeSession();
    }
  }, 200); // 200ms 刷新保证精度，同时避免后台累积
}

function pauseTimer() {
  if (!isRunning) return;
  isRunning = false;
  clearInterval(intervalId);
  intervalId = null;
  remainingSeconds = Math.max(0, Math.round((targetEndTime - Date.now()) / 1000));
  updateButtonUI();
  timerSeparatorEl.classList.add("paused");
  releaseWakeLock();
  stopKeepAlive();
  if (mode === MODE_WORK) sessionInterrupts++;
}

function resetTimer() {
  const wasRunning = isRunning;
  pauseTimer();
  remainingSeconds = mode === MODE_WORK ? totalWorkSec : totalBreakSec;
  targetEndTime = null;
  sessionInterrupts = 0;
  updateTimerDisplay();
  updateRingProgress();
  timerSeparatorEl.classList.add("paused");
  updateDocumentTitle();
  if (wasRunning && !silentMode) playClickSound();
}

function skipSession() {
  pauseTimer();
  if (!silentMode) playClickSound();
  remainingSeconds = 0;
  completeSession();
}

function completeSession() {
  pauseTimer();
  targetEndTime = null;
  if (!silentMode) playCompleteSound();
  // 设备振动
  if (!silentMode && navigator.vibrate) {
    navigator.vibrate([200, 100, 200, 100, 400]);
  }

  if (mode === MODE_WORK) {
    recordCompletedPomodoro();
    autoCompleteOneTask();
    showGoalAnimation();
    showRandomEncourage();
    sendNotification(
      "案件解决！",
      `第 ${currentSession} 轮推理完成！"真相只有一个"——休息一下吧。`
    );
    mode = MODE_BREAK;
    remainingSeconds = totalBreakSec;
  } else {
    currentSession += 1;
    showRandomEncourage();
    sendNotification(
      "新的案件出现！",
      `休息结束！第 ${currentSession} 轮调查开始！`
    );
    mode = MODE_WORK;
    remainingSeconds = totalWorkSec;
  }

  updateModeUI();
  timerSeparatorEl.classList.add("paused");
  updateDocumentTitle();
}

// ========== 足球射门动画 ==========
let goalTimer = null;

function showGoalAnimation() {
  const overlay = document.getElementById("goalOverlay");
  const countEl = document.getElementById("goalCount");
  const stats = loadStats();
  countEl.textContent = "+" + stats.totalCount;
  overlay.classList.add("show");
  if (!silentMode) playClickSound();
  clearTimeout(goalTimer);
  goalTimer = setTimeout(() => {
    overlay.classList.remove("show");
  }, 1800);
}

document.getElementById("goalOverlay").addEventListener("click", () => {
  clearTimeout(goalTimer);
  document.getElementById("goalOverlay").classList.remove("show");
});

function toggleTimer() {
  if (notificationPermission === "default") {
    requestNotificationPermission();
  }

  if (isRunning) {
    pauseTimer();
  } else {
    startTimer();
  }
}

// ========== 静音模式 ==========
function toggleSilentMode() {
  silentMode = !silentMode;
  try { localStorage.setItem("pomodoro_conan_silent", silentMode ? "1" : "0"); } catch (e) {}
  updateSilentUI();
}

function updateSilentUI() {
  const btn = document.getElementById("btnSilent");
  if (btn) {
    btn.textContent = silentMode ? "🔇" : "🔊";
    btn.classList.toggle("silent", silentMode);
  }
}

function loadSilentMode() {
  try {
    silentMode = localStorage.getItem("pomodoro_conan_silent") === "1";
  } catch (e) { /* default false */ }
  updateSilentUI();
}

function updateDocumentTitle() {
  const h = Math.floor(remainingSeconds / 3600);
  const m = Math.floor((remainingSeconds % 3600) / 60);
  const s = remainingSeconds % 60;
  let time;
  if (h > 0) {
    time = `${String(h).padStart(2, "0")}:${String(m).padStart(2, "0")}:${String(s).padStart(2, "0")}`;
  } else {
    time = `${String(m).padStart(2, "0")}:${String(s).padStart(2, "0")}`;
  }
  const icon = mode === MODE_WORK ? "🔍" : "☕";
  const label = mode === MODE_WORK ? "调查中" : "休息中";
  document.title = `${icon} ${time} · ${label} | 番茄钟`;
}

btnStart.addEventListener("click", toggleTimer);
// ========== 长按重置 ==========
let resetPressTimer = null;
let resetPressStart = 0;

function startResetPress(e) {
  e.preventDefault();
  resetPressStart = Date.now();
  btnReset.classList.add("long-pressing");
  resetPressTimer = setTimeout(() => {
    btnReset.classList.remove("long-pressing");
    resetTimer();
    if (!silentMode && navigator.vibrate) navigator.vibrate(50);
    if (!silentMode) playClickSound();
    resetPressTimer = null;
  }, 1000);
}

function endResetPress() {
  btnReset.classList.remove("long-pressing");
  if (resetPressTimer) {
    clearTimeout(resetPressTimer);
    resetPressTimer = null;
    if (Date.now() - resetPressStart < 1000) {
      showToast("长按 1 秒以重置");
    }
  }
}

btnReset.addEventListener("pointerdown", startResetPress);
btnReset.addEventListener("touchstart", startResetPress, { passive: false });
btnReset.addEventListener("pointerup", endResetPress);
btnReset.addEventListener("touchend", endResetPress);
btnReset.addEventListener("pointerleave", endResetPress);
btnReset.addEventListener("touchcancel", endResetPress);
btnSkip.addEventListener("click", skipSession);
btnClearStats.addEventListener("click", clearAllStats);
btnApplyTime.addEventListener("click", applyCustomTime);

// ========== iOS 滚轮选择器事件 ==========
pickerTabs.forEach(tab => {
  tab.addEventListener("click", function () {
    switchPickerMode(this.dataset.mode);
  });
});

[pickerHours, pickerMinutes, pickerSeconds].forEach(col => {
  col.addEventListener("scroll", function () {
    onPickerScroll(col);
  });
  // 触摸结束时做一次精确对齐
  col.addEventListener("touchend", function () {
    setTimeout(() => {
      const val = getSelectedValue(col);
      const itemH = 40;
      col.scrollTo({ top: val * itemH, behavior: "smooth" });
      updatePickerSelection(col);
      updatePickerDisplay();
    }, 100);
  });
});

document.addEventListener("keydown", (e) => {
  if (e.code === "Space" && e.target === document.body) {
    e.preventDefault();
    toggleTimer();
  }
});

document.getElementById("btnSilent").addEventListener("click", toggleSilentMode);

document.addEventListener("visibilitychange", () => {
  if (!document.hidden) {
    if (isRunning && targetEndTime) {
      const now = Date.now();
      const corrected = Math.max(0, Math.round((targetEndTime - now) / 1000));
      if (corrected <= 0) {
        // 计时已到期，直接触发完成
        remainingSeconds = 0;
        updateTimerDisplay();
        updateRingProgress();
        completeSession();
        return;
      }
      remainingSeconds = corrected;
    }
    // 从后台恢复时重新获取 Wake Lock
    if (isRunning && !wakeLock) {
      requestWakeLock();
      startKeepAlive();
    }
    updateTimerDisplay();
    updateRingProgress();
    updateModeUI();
    updateButtonUI();
    updateDocumentTitle();
    refreshStatsForToday();
  }
});

// ========== 任务列表系统 ==========
const TASK_STORAGE_KEY = "pomodoro_conan_tasks_v1";
function loadTasks() {
  const today = getTodayStr();
  try {
    const raw = localStorage.getItem(TASK_STORAGE_KEY);
    const data = raw ? JSON.parse(raw) : null;
    if (data && data.date === today) return data.tasks;
  } catch (e) { /* fall through */ }
  return [];
}

function saveTasks(tasks) {
  try {
    localStorage.setItem(TASK_STORAGE_KEY, JSON.stringify({
      date: getTodayStr(),
      tasks,
    }));
  } catch (e) { /* 静默 */ }
}

function renderTaskList() {
  const tasks = loadTasks();
  const container = document.getElementById("taskList");
  const progressEl = document.getElementById("taskProgress");
  const doneCount = tasks.filter((t) => t.done).length;
  const total = tasks.length;

  progressEl.textContent = `${doneCount}/${total} 已解决`;

  container.innerHTML = tasks.map((t) => `
    <div class="task-card ${t.done ? "completed" : ""}" data-task-id="${t.id}">
      <span class="task-card-icon">${t.done ? "✅" : "🔍"}</span>
      <div class="task-card-body">
        <div class="task-card-name">${escapeHtml(t.name)}</div>
        <div class="task-card-meta">案件 #${String(t.order + 1).padStart(3, "0")}</div>
      </div>
      <span class="task-card-status ${t.done ? "done" : "in-progress"}">${t.done ? "已结案" : "调查中"}</span>
      <button class="task-card-delete" data-delete-id="${t.id}" title="删除">✕</button>
    </div>
  `).join("");

  container.querySelectorAll(".task-card-delete").forEach((btn) => {
    btn.addEventListener("click", (e) => {
      e.stopPropagation();
      deleteCustomTask(btn.dataset.deleteId);
    });
  });
}

function escapeHtml(str) {
  const div = document.createElement("div");
  div.textContent = str;
  return div.innerHTML;
}

function autoCompleteOneTask() {
  const tasks = loadTasks();
  const undone = tasks.find((t) => !t.done);
  if (undone) {
    undone.done = true;
    saveTasks(tasks);
    renderTaskList();
  }
}

function addCustomTask(name) {
  const tasks = loadTasks();
  const maxId = tasks.reduce((m, t) => {
    const n = parseInt(t.id.replace(/\D/g, ""), 10) || 0;
    return Math.max(m, n);
  }, 0);
  tasks.push({
    id: "c" + (maxId + 1),
    name: name.trim(),
    done: false,
    isPreset: false,
    order: tasks.length,
  });
  saveTasks(tasks);
  renderTaskList();
}

function deleteCustomTask(taskId) {
  let tasks = loadTasks();
  tasks = tasks.filter((t) => t.id !== taskId);
  tasks.forEach((t, i) => { t.order = i; });
  saveTasks(tasks);
  renderTaskList();
}

document.getElementById("btnTaskAdd").addEventListener("click", () => {
  const input = document.getElementById("taskAddInput");
  const name = input.value.trim();
  if (!name) { showToast("请输入案件名称"); return; }
  if (name.length > 30) { showToast("案件名称不超过 30 字"); return; }
  addCustomTask(name);
  input.value = "";
  if (!silentMode) playClickSound();
});

document.getElementById("taskAddInput").addEventListener("keydown", (e) => {
  if (e.key === "Enter") {
    document.getElementById("btnTaskAdd").click();
  }
});

// ========== 初始化 ==========
function init() {
  buildAllPickerItems();
  loadTimeConfig();
  loadSilentMode();
  updateModeUI();
  updateButtonUI();
  refreshStatsForToday();
  renderTaskList();
  updateDocumentTitle();
  startEncourageRotation();
}

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", init);
  } else {
    init();
  }

</script>
